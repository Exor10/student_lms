<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduLMS | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <section class="auth-card">
        <h1 class="brand-title">EduLMS</h1>
        <p class="auth-subtitle">Login to your teacher or student account.</p>

        <form id="login-form" class="auth-form">
          <label>
            Email
            <input type="email" id="email" name="email" required />
          </label>
          <label>
            Password
            <input type="password" id="password" name="password" required />
          </label>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <p id="login-message" class="form-message" aria-live="polite"></p>
        <p class="auth-link-row">No account yet? <a href="./pages/register.html">Register here</a>.</p>
      </section>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
  </body>
</html>
